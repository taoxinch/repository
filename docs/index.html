<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>REPLACE ME</title>
</head>
<body>
    <h1>站点名称：REPLACE ME</h1>
    <p>本地时间戳：<span id="time"></span></p>
    <script>
        // 展示当前时间戳
        function showTime(){
            const now = new Date();
            document.getElementById('time').innerText = now.toString();
        }
        showTime();
    </script>
</body>
</html>
